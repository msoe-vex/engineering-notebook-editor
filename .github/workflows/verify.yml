name: Build and Lint

on:
  pull_request:
    branches:
      - main

# Global defaults for all jobs since your project is in a subdirectory
defaults:
  run:
    working-directory: website

jobs:
  # JOB 1: Install dependencies once and cache them
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

  # JOB 2: Run Lint (Runs in parallel with Build)
  lint:
    runs-on: ubuntu-latest
    needs: setup # Waits for setup to verify dependencies are cached
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Run Lint
        run: npm run lint -- --max-warnings 0

  # JOB 3: Run Build (Runs in parallel with Lint)
  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      # Next.js Build Cache Optimization
      - name: Next.js cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/website/.next/cache
          # Changes key when dependencies change, or on a per-commit basis for incremental builds
          key: ${{ runner.os }}-nextjs-${{ hashFiles('website/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('website/package-lock.json') }}-

      - name: Run Build
        run: npm run build